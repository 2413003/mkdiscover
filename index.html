<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MK</title>
  <meta
    name="description"
    content="Find in MK."
  />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preload" as="script" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260413-minimal" />
</head>
<body>
  <main class="app">
    <header id="hero" class="hero">
      <div class="search-mode" role="tablist" aria-label="Search mode">
        <button id="mode-discover" class="mode-button is-active" type="button" role="tab" aria-selected="true" aria-label="Find">
          <span class="ui-icon" aria-hidden="true">&#128269;</span>
          <span class="sr-only">Find</span>
        </button>
        <button id="mode-plan" class="mode-button" type="button" role="tab" aria-selected="false" aria-label="Plan">
          <span class="ui-icon" aria-hidden="true">&#128197;</span>
          <span class="sr-only">Plan</span>
        </button>
      </div>

      <form id="search-form" class="search-form" aria-label="Search Milton Keynes listings">
        <label class="sr-only" for="search-input">Search listings in Milton Keynes</label>
        <input
          id="search-input"
          name="q"
          type="search"
          autocomplete="off"
          placeholder="MK"
          aria-label="Search listings in Milton Keynes"
        />
        <button class="icon-button" type="submit" aria-label="Search">
          <span class="ui-icon" aria-hidden="true">&#8594;</span>
          <span class="sr-only">Search</span>
        </button>
      </form>

      <form id="plan-form" class="plan-form" aria-label="Plan in Milton Keynes" hidden>
        <label class="plan-field" for="plan-when">
          <span class="sr-only">When</span>
          <select id="plan-when" name="when">
            <option value="any">Any time</option>
            <option value="today">Today</option>
            <option value="tonight">Tonight</option>
            <option value="this-week">This week</option>
            <option value="this-weekend">This weekend</option>
            <option value="next-30-days">Next 30 days</option>
          </select>
        </label>

        <label class="plan-field" for="plan-who">
          <span class="sr-only">Who</span>
          <select id="plan-who" name="who">
            <option value="any">Anyone</option>
            <option value="families">Families</option>
            <option value="kids">Kids</option>
            <option value="couples">Couples</option>
            <option value="friends">Friends</option>
            <option value="solo">Solo</option>
          </select>
        </label>

        <button class="icon-button" type="submit" aria-label="Plan">
          <span class="ui-icon" aria-hidden="true">&#8594;</span>
          <span class="sr-only">Plan</span>
        </button>
      </form>

      <div id="status-line" class="status-line" aria-live="polite"></div>

      <div id="refine-row" class="refine-row" aria-label="Refine search results">
        <button id="filters-toggle" class="ghost-button filters-toggle icon-button" type="button" aria-expanded="false" aria-controls="filters-menu" aria-label="More" hidden>
          <span class="ui-icon" aria-hidden="true">&#9776;</span>
          <span class="sr-only">More</span>
        </button>

        <div id="filters-menu" class="filters-menu">
          <label class="field field-select" for="category-filter">
            <span class="field-label sr-only">Type</span>
            <select id="category-filter">
              <option value="">All</option>
            </select>
          </label>

          <label class="field field-select" for="sort-filter">
            <span class="field-label sr-only">Sort</span>
            <select id="sort-filter">
              <option value="relevance">Best</option>
              <option value="newest">New</option>
              <option value="popular">Top</option>
              <option value="nearby">Near</option>
              <option value="name">A-Z</option>
            </select>
          </label>

          <label class="field field-toggle" for="open-now-filter">
            <input id="open-now-filter" type="checkbox" />
            <span class="ui-icon" aria-hidden="true">&#9679;</span>
            <span class="sr-only">Now</span>
          </label>

          <button id="use-location-button" class="ghost-button icon-button" type="button" aria-label="Near">
            <span class="ui-icon" aria-hidden="true">&#9673;</span>
            <span class="sr-only">Near</span>
          </button>
        </div>

        <div class="refine-actions">
          <button id="open-submit-panel" class="ghost-button icon-button" type="button" aria-label="Add">
            <span class="ui-icon" aria-hidden="true">+</span>
            <span class="sr-only">Add</span>
          </button>
          <button id="open-operator-panel" class="ghost-button icon-button" type="button" aria-label="Moderate">
            <span class="ui-icon" aria-hidden="true">&#9881;</span>
            <span class="sr-only">Moderate</span>
          </button>
        </div>
      </div>
    </header>

    <section id="submit-panel" class="submit-panel" hidden>
      <div class="panel-head">
        <h2>Add</h2>
      </div>

      <form id="submit-form" class="submit-form">
        <label class="submit-field" for="submit-title">
          <span>Title</span>
          <input id="submit-title" name="title" type="text" maxlength="120" required />
        </label>

        <label class="submit-field" for="submit-category">
          <span>Type</span>
          <select id="submit-category" name="category" required>
            <option value="">Select category</option>
          </select>
        </label>

        <label class="submit-field submit-field--wide" for="submit-description">
          <span>Notes</span>
          <textarea id="submit-description" name="description" rows="3" maxlength="400" required></textarea>
        </label>

        <label class="submit-field" for="submit-website-url">
          <span>Site</span>
          <input id="submit-website-url" name="website_url" type="url" placeholder="https://..." />
        </label>

        <label class="submit-field" for="submit-booking-url">
          <span>Book</span>
          <input id="submit-booking-url" name="booking_url" type="url" placeholder="https://..." />
        </label>

        <label class="submit-field" for="submit-location">
          <span>Place</span>
          <input id="submit-location" name="location" type="text" maxlength="180" placeholder="Area, venue, or postcode" />
        </label>

        <div class="submit-field submit-location-tools">
          <span>Pin</span>
          <button id="submit-use-location-button" class="ghost-button" type="button">Use</button>
          <small id="submit-location-status" class="submit-location-status"></small>
          <input id="submit-latitude" name="latitude" type="hidden" />
          <input id="submit-longitude" name="longitude" type="hidden" />
        </div>

        <label class="submit-field" for="submit-image-file">
          <span>Image</span>
          <input id="submit-image-file" name="image_file" type="file" accept="image/*" />
        </label>

        <div id="submit-image-preview-wrap" class="submit-image-preview-wrap" hidden>
          <img id="submit-image-preview" class="submit-image-preview" alt="Listing image preview" />
        </div>

        <label class="submit-field" for="submit-starts-at">
          <span>Start</span>
          <input id="submit-starts-at" name="starts_at" type="datetime-local" />
        </label>

        <label class="submit-field" for="submit-tags">
          <span>Tags</span>
          <input id="submit-tags" name="tags" type="text" maxlength="140" placeholder="chess, live music, brunch" />
        </label>

        <label class="submit-field" for="submit-source-url">
          <span>Source URL</span>
          <input id="submit-source-url" name="source_url" type="url" placeholder="https://..." />
        </label>

        <label class="submit-field" for="submit-name">
          <span>Your name</span>
          <input id="submit-name" name="name" type="text" maxlength="80" />
        </label>

        <div class="submit-actions">
          <button id="submit-button" type="submit">Add</button>
          <button id="close-submit-panel" class="ghost-button" type="button">Close</button>
        </div>
      </form>

      <p id="submit-feedback" class="submit-feedback" aria-live="polite"></p>
    </section>

    <section id="operator-panel" class="operator-panel" hidden>
      <div class="panel-head">
        <h2>Mod</h2>
        <p id="operator-status-text"></p>
      </div>

      <form id="operator-login-form" class="operator-login">
        <label class="submit-field" for="operator-email">
          <span>Email</span>
          <input id="operator-email" name="operator_email" type="email" required placeholder="you@example.com" />
        </label>
        <button id="operator-login-button" type="submit">Send</button>
      </form>

      <div class="operator-actions">
        <button id="operator-claim-button" class="ghost-button" type="button" hidden>Claim</button>
        <button id="operator-refresh-button" class="ghost-button" type="button" hidden>Sync</button>
        <button id="operator-signout-button" class="ghost-button" type="button" hidden>Out</button>
      </div>

      <p id="operator-feedback" class="operator-feedback" aria-live="polite"></p>
      <div id="operator-drafts" class="operator-drafts"></div>
    </section>

    <section class="discovery-layout">
      <section class="discovery-list">
        <section id="results-head" class="results-head">
          <p id="results-summary"></p>
        </section>
        <section id="results-grid" class="results-grid"></section>
      </section>

      <aside id="nearby-panel" class="nearby-panel" hidden>
        <div class="nearby-panel__head">
          <p id="nearby-summary"></p>
        </div>
        <div id="nearby-map" class="nearby-map" aria-label="Nearby listings map"></div>
      </aside>
    </section>

    <nav class="mobile-bottom-nav" aria-label="Primary">
      <button class="mobile-bottom-nav__item is-active" type="button">
        <span class="mobile-bottom-nav__icon" aria-hidden="true">&#128269;</span>
        <span class="sr-only">Explore</span>
      </button>
      <button class="mobile-bottom-nav__item" type="button">
        <span class="mobile-bottom-nav__icon" aria-hidden="true">&#9825;</span>
        <span class="sr-only">Saved</span>
      </button>
      <button class="mobile-bottom-nav__item" type="button">
        <span class="mobile-bottom-nav__icon" aria-hidden="true">&#9711;</span>
        <span class="sr-only">Log in</span>
      </button>
    </nav>
  </main>

  <template id="result-card-template">
    <article class="result-card">
      <div class="result-card__media">
        <img class="result-card__image" alt="" loading="lazy" />
        <div class="result-card__top">
          <span class="result-card__category"></span>
          <span class="result-card__state"></span>
        </div>
      </div>
      <div class="result-card__body">
        <h3 class="result-card__title"></h3>
        <p class="result-card__description"></p>
        <div class="result-card__meta"></div>
        <div class="result-card__footer">
          <div class="result-card__footnote"></div>
          <div class="result-card__action"></div>
        </div>
      </div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <script src="config.js?v=20260413o"></script>
  <script src="app.js?v=20260413-marketplace"></script>
</body>
</html>
