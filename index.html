<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MK Discover</title>
  <meta name="description" content="Discover what is happening, available, and worth knowing in Milton Keynes." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="brand">MK Discover</p>
      <h1>What should you do in Milton Keynes?</h1>
      <p class="hero-copy">Search real local listings in seconds.</p>

      <form id="search-form" class="search-form" aria-label="Search Milton Keynes listings">
        <label class="sr-only" for="search-input">Search listings in Milton Keynes</label>
        <input
          id="search-input"
          name="q"
          type="search"
          autocomplete="off"
          placeholder="Search MK: brunch, jobs, boxing, chess..."
          aria-label="Search listings in Milton Keynes"
        />
        <button type="submit">Search</button>
      </form>

      <div class="refine-row" aria-label="Refine search results">
        <label class="field field-select" for="category-filter">
          <span class="field-label">Category</span>
          <select id="category-filter">
            <option value="">All categories</option>
          </select>
        </label>

        <label class="field field-select" for="sort-filter">
          <span class="field-label">Sort</span>
          <select id="sort-filter">
            <option value="relevance">Relevance</option>
            <option value="newest">Newest</option>
            <option value="name">Name</option>
          </select>
        </label>

        <label class="field field-toggle" for="open-now-filter">
          <input id="open-now-filter" type="checkbox" />
          <span>Open now</span>
        </label>
      </div>
    </header>

    <section id="status-line" class="status-line" aria-live="polite"></section>

    <section class="results-head">
      <h2>Results</h2>
      <p id="results-summary">No results yet.</p>
    </section>

    <section id="results-grid" class="results-grid"></section>
  </main>

  <template id="result-card-template">
    <article class="result-card">
      <div class="result-card__top">
        <span class="result-card__category"></span>
        <span class="result-card__state"></span>
      </div>
      <h3 class="result-card__title"></h3>
      <p class="result-card__description"></p>
      <div class="result-card__meta"></div>
      <div class="result-card__action"></div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
